<app-navbar></app-navbar>

<div class="dashboard-container">

    <h1>Online Order Management System</h1>

    <p class="subtitle">
        Welcome to your Admin Dashboard
    </p>

    <div class="cards">

        <div class="card">
            <div class="number">{{dashboard.totalProducts}}</div>
            <div class="title">Products</div>
        </div>

        <div class="card">
            <div class="number">{{dashboard.totalCategories}}</div>
            <div class="title">Categories</div>
        </div>

        <div class="card">
            <div class="number">{{dashboard.totalCustomers}}</div>
            <div class="title">Customers</div>
        </div>

        <div class="card">
            <div class="number">{{dashboard.totalOrders}}</div>
            <div class="title">Orders</div>
        </div>

    </div>

    <div class="quick-actions">

        <button routerLink="/category">
            Categories
        </button>

        <button routerLink="/product">
            Products
        </button>

        <button routerLink="/customer">
            Customers
        </button>

        <button routerLink="/order">
            Orders
        </button>

    </div>

</div>
